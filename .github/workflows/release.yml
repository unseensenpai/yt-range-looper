name: Package Extension and Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Zip Extension Files
        run: |
          zip -r yt-range-looper.zip manifest.json content.js styles.css README.md

      - name: Create GitHub Release and Upload Zip
        uses: softprops/action-gh-release@v2
        with:
          files: yt-range-looper.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}